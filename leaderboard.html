<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>豬布林金幣台 · 排行榜</title>
<link rel="stylesheet" href="css/main.css">
<style>
body {
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 15px, rgba(200,138,42,.03) 15px, rgba(200,138,42,.03) 16px),
    repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(200,138,42,.03) 15px, rgba(200,138,42,.03) 16px);
}

/* 豬布林標題 */
@keyframes piglin-enter { 0%{transform:translateX(-120vw) rotate(-8deg);opacity:0} 60%{transform:translateX(8px) rotate(2deg);opacity:1} 100%{transform:translateX(0) rotate(0);opacity:1} }
.piglin-anim { animation: piglin-enter .7s .2s cubic-bezier(.22,1,.36,1) both; }

/* 排行榜卡片 */
.lb-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }

.lb-card {
  background: var(--bg2);
  border: 2px solid var(--border); border-bottom-color: #555; border-right-color: #555;
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; position: relative; overflow: hidden;
  transition: transform .1s;
}
.lb-card:hover { transform: translateX(2px); }

/* 左側彩條 */
.lb-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.lb-card.rank-1::before { background: var(--gold); }
.lb-card.rank-2::before { background: #c0c0c8; }
.lb-card.rank-3::before { background: #cd7f32; }

/* 金色邊框給第一名 */
.lb-card.rank-1 {
  border-color: rgba(245,230,66,.4); border-bottom-color: rgba(100,80,10,.6); border-right-color: rgba(100,80,10,.6);
  background: rgba(245,230,66,.04);
}

/* 排名數字 */
.lb-rank {
  font-family: 'Press Start 2P', monospace; font-size: 20px;
  min-width: 38px; text-align: center; line-height: 1;
}
.rank-1 .lb-rank { color: var(--gold); text-shadow: 0 0 10px rgba(245,230,66,.4); }
.rank-2 .lb-rank { color: #c0c0c8; }
.rank-3 .lb-rank { color: #cd7f32; }
.lb-card:not(.rank-1):not(.rank-2):not(.rank-3) .lb-rank { color: var(--muted); font-size: 14px; }

/* 玩家頭顱 */
.lb-skull {
  width: 44px; height: 44px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  background: rgba(0,0,0,.4); border: 2px solid var(--border);
  border-bottom-color: #555; border-right-color: #555;
  position: relative;
}
.lb-skull .crown {
  position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
  font-size: 14px; line-height: 1;
}

/* 隊伍資訊 */
.lb-info { flex: 1; min-width: 0; }
.lb-squad-name {
  font-family: 'Press Start 2P', monospace; font-size: 10px;
  margin-bottom: 5px; line-height: 1.5;
}
.lb-seals { display: flex; gap: 3px; margin-bottom: 4px; }
.lb-seal {
  width: 18px; height: 18px; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.06);
  filter: grayscale(1); opacity: .2;
}
.lb-seal.got { filter: none; opacity: 1; border-color: rgba(245,230,66,.3); background: rgba(245,230,66,.06); }
.lb-sub { font-size: 12px; color: var(--muted); }

/* 分數 */
.lb-score { text-align: right; flex-shrink: 0; }
.lb-pts {
  font-family: 'Press Start 2P', monospace; font-size: 22px;
  color: var(--piglin); line-height: 1; display: block; margin-bottom: 4px;
}
.rank-1 .lb-pts { font-size: 26px; color: var(--gold); text-shadow: 0 0 12px rgba(245,230,66,.4); }
.lb-hearts { display: flex; justify-content: flex-end; gap: 1px; flex-wrap: wrap; max-width: 60px; }
.lbh { font-size: 10px; line-height: 1; }
.lbh.empty { opacity: .15; }

/* HP 條 */
.lb-bar-wrap { height: 4px; background: rgba(0,0,0,.5); border: 1px solid var(--border); margin-top: 5px; }
.lb-bar { height: 100%; background: linear-gradient(90deg, var(--tnt-red), #ff8844); transition: width .5s ease; }
.rank-1 .lb-bar { background: linear-gradient(90deg, var(--gold), #ffaa00); }

/* 更新時間 */
.last-update { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--muted); text-align: center; margin-bottom: 16px; }

/* 附魔台管理面板 */
.enchant-toggle {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 12px; cursor: pointer;
  background: linear-gradient(135deg, #0a0520, #180a30);
  border: 2px solid rgba(85,51,255,.3); border-bottom-color: #110044; border-right-color: #110044;
  font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--enchant2);
  margin-bottom: 10px; transition: all .1s;
}
.enchant-toggle:hover { border-color: var(--enchant); }

.enchant-panel {
  display: none;
  background: linear-gradient(160deg, #0a0520, #1a0a35);
  border: 2px solid var(--enchant); border-bottom-color: #220088; border-right-color: #220088;
  padding: 16px; margin-bottom: 16px;
}
.enchant-panel.open { display: block; }
.ep-title { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--enchant); margin-bottom: 14px; }

.ep-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.ep-label { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--muted); min-width: 52px; }
.ep-select {
  flex: 1; background: rgba(0,0,0,.5); border: 2px solid #333; border-bottom-color: #777; border-right-color: #777;
  color: var(--text); font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 7px 8px; outline: none;
}
.ep-input {
  flex: 1; background: rgba(0,0,0,.5); border: 2px solid #333; border-bottom-color: #777; border-right-color: #777;
  color: var(--gold); font-family: 'Press Start 2P', monospace; font-size: 14px;
  padding: 7px; text-align: center; outline: none; transition: border-color .15s;
}
.ep-input:focus { border-color: var(--gold); }

/* 印記切換格 */
.seal-slots-admin { display: flex; gap: 6px; }
.ssa {
  width: 44px; height: 44px; font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.4); border: 2px solid #222; border-bottom-color: #666; border-right-color: #666;
  cursor: pointer; filter: grayscale(1); opacity: .3; transition: all .15s;
}
.ssa.on { filter: none; opacity: 1; border-color: var(--gold) #6a5000 #6a5000 var(--gold); background: rgba(245,230,66,.08); }

.ep-btn-row { display: flex; gap: 6px; margin-top: 12px; }
.ep-btn {
  flex: 1; padding: 10px 4px; font-family: 'Press Start 2P', monospace; font-size: 8px;
  cursor: pointer; border: 2px solid; background: transparent;
  transition: all .08s; line-height: 1.6;
}
.ep-btn.load { color: var(--wither); border-color: rgba(136,136,204,.3); }
.ep-btn.load:hover { background: rgba(136,136,204,.08); }
.ep-btn.save { color: var(--creeper); border-color: rgba(74,154,74,.3); }
.ep-btn.save:hover { background: rgba(74,154,74,.08); }
.ep-btn.danger { color: var(--tnt-red); border-color: rgba(200,34,34,.2); }
.ep-btn.danger:hover { background: rgba(200,34,34,.06); }

/* 密碼輸入 */
.pass-panel {
  display: none;
  background: var(--bg2); border: 2px solid var(--border); border-bottom-color: #555; border-right-color: #555;
  padding: 16px; margin-bottom: 10px;
}
.pass-input {
  width: 100%; background: rgba(0,0,0,.5); border: 2px solid #333; border-bottom-color: #777; border-right-color: #777;
  color: var(--text); font-family: 'Press Start 2P', monospace; font-size: 13px;
  padding: 10px; text-align: center; letter-spacing: .2em; outline: none; margin-bottom: 10px;
}
.pass-submit {
  width: 100%; padding: 12px; cursor: pointer; border: none;
  font-family: 'Press Start 2P', monospace; font-size: 9px;
  background: linear-gradient(135deg, rgba(85,51,255,.2), rgba(155,89,182,.2));
  border: 2px solid var(--enchant); border-bottom-color: #220088; border-right-color: #220088;
  color: var(--enchant2); transition: all .1s;
}
.pass-submit:hover { background: linear-gradient(135deg, rgba(85,51,255,.3), rgba(155,89,182,.3)); }
</style>
</head>
<body>

<div id="mc-intro">
  <div class="creeper-explode" style="background:radial-gradient(circle,rgba(200,138,42,.4) 0%,transparent 70%)"></div>
  <div style="font-size:64px;animation:creeper-enter .6s cubic-bezier(.22,1,.36,1) forwards;opacity:0">🐗</div>
  <div id="intro-tagline" style="margin-top:16px">PIGLIN BARTER!<br>金幣排行榜載入中...</div>
</div>
<div id="tnt-flash" style="background:rgba(200,138,42,.4)"></div>

<nav id="hotbar">
  <div class="hotbar-inner">
    <a href="index.html" class="hb-slot"><span class="hb-icon">⚔️</span><span class="hb-label">QUEST</span></a>
    <a href="rules.html" class="hb-slot"><span class="hb-icon">📖</span><span class="hb-label">RULES</span></a>
    <a href="leaderboard.html" class="hb-slot active"><span class="hb-icon">🏆</span><span class="hb-label">RANK</span></a>
    <a href="map.html" class="hb-slot"><span class="hb-icon">🗺️</span><span class="hb-label">MAP</span></a>
    <a href="certificate.html" class="hb-slot"><span class="hb-icon">🎖️</span><span class="hb-label">CERT</span></a>
  </div>
</nav>

<div id="pts"></div>
<div id="toast"></div>

<div class="wrap piglin-anim">

  <!-- Header -->
  <div class="page-hero">
    <div class="page-eyebrow" style="color:var(--piglin);border-color:rgba(200,138,42,.3)">🐗 PIGLIN TRADING POST</div>
    <div class="page-title" style="color:var(--piglin)">界域戰力<br>排行榜</div>
    <div class="page-sub">以物易物 · 金幣積分台</div>
  </div>

  <div class="last-update">LAST UPDATE: <span id="last-update-time">--:--</span></div>

  <!-- 排行榜 -->
  <div class="lb-list" id="lb-list">
    <!-- 由 JS 渲染 -->
  </div>

  <!-- 附魔台入口 -->
  <div class="enchant-toggle" onclick="toggleAdmin()">
    ✨ ENCHANTMENT TABLE · 輔導員管理台
  </div>

  <!-- 密碼面板 -->
  <div class="pass-panel" id="pass-panel">
    <div style="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);margin-bottom:10px">// ENTER ADMIN PASSWORD</div>
    <input type="password" class="pass-input" id="pass-input" placeholder="輸入附魔密碼" maxlength="20">
    <button class="pass-submit" onclick="checkPass()">🔮 解鎖附魔台</button>
  </div>

  <!-- 附魔台管理面板 -->
  <div class="enchant-panel" id="admin-panel">
    <div class="ep-title">✨ ENCHANTMENT TABLE · 積分管理</div>
    <div class="ep-row">
      <span class="ep-label">小隊</span>
      <select class="ep-select" id="edit-squad">
        <option value="1">第 1 隊 🪖</option>
        <option value="2">第 2 隊 🗡️</option>
        <option value="3">第 3 隊 🏹</option>
        <option value="4">第 4 隊 🛡️</option>
        <option value="5">第 5 隊 ⚔️</option>
        <option value="6">第 6 隊 🔱</option>
      </select>
    </div>
    <div class="ep-row">
      <span class="ep-label">魂力</span>
      <input type="number" class="ep-input" id="edit-score" value="0" min="0" max="999">
    </div>
    <div class="ep-row">
      <span class="ep-label">印記</span>
      <div class="seal-slots-admin" id="seal-admin">
        <div class="ssa" data-seal="a" onclick="toggleAdminSeal(this)">💚</div>
        <div class="ssa" data-seal="b" onclick="toggleAdminSeal(this)">🪓</div>
        <div class="ssa" data-seal="c" onclick="toggleAdminSeal(this)">💀</div>
        <div class="ssa" data-seal="d" onclick="toggleAdminSeal(this)">💨</div>
      </div>
    </div>
    <div class="ep-btn-row">
      <button class="ep-btn load" onclick="loadSquad()">📥 載入</button>
      <button class="ep-btn save" onclick="saveSquad()">💾 儲存</button>
      <button class="ep-btn danger" onclick="resetAll()">🗑 重置</button>
    </div>
  </div>

  <div style="height:20px"></div>
</div>

<script src="js/common.js"></script>
<script>
const ADMIN_PASS = '115仁愛'; // ← 改成你要的密碼
const SQUADS = 6;
const SEAL_ICONS = { a:'💚', b:'🪓', c:'💀', d:'💨' };
const SQUAD_ICONS = ['🪖','🗡️','🏹','🛡️','⚔️','🔱'];

function defaultData() {
  return {
    squads: Array.from({ length: SQUADS }, (_, i) => ({
      id: i+1, score: 0, seals: { a:false, b:false, c:false, d:false }
    })),
    updated: ''
  };
}
function loadData() {
  try { return JSON.parse(localStorage.getItem('mc_lb_v1') || 'null') || defaultData(); }
  catch { return defaultData(); }
}
function saveData(d) {
  d.updated = new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
  localStorage.setItem('mc_lb_v1', JSON.stringify(d));
  renderLB(d);
}

// ── 渲染排行榜 ──
function renderLB(d) {
  const sorted = [...d.squads].sort((a,b) => b.score - a.score);
  const maxScore = Math.max(...sorted.map(s => s.score), 1);
  const mySquad = parseInt(localStorage.getItem('mc_my_squad') || '0');

  const list = document.getElementById('lb-list');
  list.innerHTML = sorted.map((sq, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? `rank-${rank}` : '';
    const rankLabel = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    const isMine = sq.id === mySquad;
    const pct = Math.round((sq.score / maxScore) * 100);
    const sealCount = Object.values(sq.seals).filter(Boolean).length;

    // Hearts (max 10 hearts = score 20)
    const maxHearts = 10;
    const filled = Math.min(Math.floor(sq.score / 3), maxHearts);
    let hearts = '';
    for (let h = 0; h < maxHearts; h++) {
      hearts += `<span class="lbh${h < filled ? '' : ' empty'}">❤️</span>`;
    }

    const sealsHTML = ['a','b','c','d'].map(k =>
      `<div class="lb-seal${sq.seals[k] ? ' got' : ''}">${SEAL_ICONS[k]}</div>`
    ).join('');

    return `<div class="lb-card ${rankClass}${isMine ? ' current' : ''}">
      <div class="lb-rank">${rankLabel}</div>
      <div class="lb-skull">
        ${rank === 1 ? '<span class="crown">👑</span>' : ''}
        ${SQUAD_ICONS[sq.id-1]}
      </div>
      <div class="lb-info">
        <div class="lb-squad-name">第 ${sq.id} 隊${isMine ? ' ◄' : ''}</div>
        <div class="lb-seals">${sealsHTML}</div>
        <div class="lb-sub">${sealCount}/4 印記${sealCount===4?' · ★ 全印記':''}</div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%"></div></div>
      </div>
      <div class="lb-score">
        <span class="lb-pts">${sq.score}</span>
        <div class="lb-hearts">${hearts}</div>
      </div>
    </div>`;
  }).join('');

  const tu = document.getElementById('last-update-time');
  if (tu) tu.textContent = d.updated || '--:--';
}

// ── Admin ──
let adminUnlocked = false;

function toggleAdmin() {
  if (adminUnlocked) {
    document.getElementById('admin-panel').classList.toggle('open');
  } else {
    const pp = document.getElementById('pass-panel');
    pp.style.display = pp.style.display === 'none' ? 'block' : 'none';
  }
}

function checkPass() {
  if (document.getElementById('pass-input').value === ADMIN_PASS) {
    adminUnlocked = true;
    document.getElementById('pass-panel').style.display = 'none';
    document.getElementById('admin-panel').classList.add('open');
    showToast('✨ 附魔台已解鎖！', 'purple');
  } else {
    showToast('❌ 密碼錯誤！', 'red');
    document.getElementById('pass-input').value = '';
  }
}

function toggleAdminSeal(el) { el.classList.toggle('on'); }

function loadSquad() {
  const id = parseInt(document.getElementById('edit-squad').value);
  const sq = loadData().squads.find(s => s.id === id);
  if (!sq) return;
  document.getElementById('edit-score').value = sq.score;
  document.querySelectorAll('.ssa').forEach(el => {
    el.classList.toggle('on', sq.seals[el.dataset.seal]);
  });
  showToast(`📥 第 ${id} 隊資料已載入`);
}

function saveSquad() {
  const id = parseInt(document.getElementById('edit-squad').value);
  const score = parseInt(document.getElementById('edit-score').value) || 0;
  const seals = {};
  document.querySelectorAll('.ssa').forEach(el => { seals[el.dataset.seal] = el.classList.contains('on'); });
  const d = loadData();
  const sq = d.squads.find(s => s.id === id);
  if (!sq) return;
  sq.score = score; sq.seals = seals;
  saveData(d);
  showToast(`💾 第 ${id} 隊已更新！${score} 魂力`, 'green');
}

function resetAll() {
  if (!confirm('確定清除所有隊伍資料？')) return;
  saveData(defaultData());
  showToast('🗑 全部資料已重置', 'red');
}

window.addEventListener('DOMContentLoaded', () => {
  initBlockParticles(18, '#c88a2a');
  initCreeperIntro();
  renderLB(loadData());
  setInterval(() => renderLB(loadData()), 30000);
});
</script>
</body>
</html>
